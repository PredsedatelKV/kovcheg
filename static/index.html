<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Ковчег</title>
  <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div id="app">
    <main id="view" class="view"></main>
    <nav id="tabbar" class="tabbar">
      <button class="tabbtn" data-tab="home" aria-label="Главная">
        <img class="tab-icon" src="/static/img/tabs/home.svg" alt=""/>
        <span>Главная</span>
      </button>
      <button class="tabbtn" data-tab="profile" aria-label="Профиль">
        <img class="tab-icon" src="/static/img/tabs/profile.svg" alt=""/>
        <span>Профиль</span>
      </button>
      <button class="tabbtn" data-tab="koverna" aria-label="Коверна">
        <img class="tab-icon" src="/static/img/tabs/koverna.svg" alt=""/>
        <span>Коверна</span>
      </button>
      <button class="tabbtn admin-only" data-tab="admin" aria-label="Админ" hidden>
        <img class="tab-icon" src="/static/img/tabs/admin.svg" alt=""/>
        <span>Админ</span>
      </button>
    </nav>
  </div>

  <div id="modal-root"></div>
  <script type="module" src="/static/app.js"></script>
</body>
</html>
