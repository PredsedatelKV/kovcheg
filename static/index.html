<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Ковчег</title>
  <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
  <link rel="stylesheet" href="/static/style.css?v=96" />
</head>
<body>
  <div id="app">
    <main id="view" class="view"></main>
    <nav id="tabbar" class="tabbar">
      <button class="tabbtn" data-tab="koverna" aria-label="Коверна">
        <span class="tab-icon" style="--mask-url:url(/static/img/tabs/koverna.svg)"></span>
        <span>Коверна</span>
      </button>
      <button class="tabbtn" data-tab="profile" aria-label="Профиль">
        <span class="tab-icon" style="--mask-url:url(/static/img/tabs/profile.svg)"></span>
        <span>Профиль</span>
      </button>
      <button class="tabbtn" data-tab="home" aria-label="Главная">
        <span class="tab-icon" style="--mask-url:url(/static/img/tabs/home.svg)"></span>
        <span>Главная</span>
      </button>
      <button class="tabbtn" data-tab="arcade" aria-label="Аркада">
        <span class="tab-icon" style="--mask-url:url(/static/img/tabs/gamepad.svg)"></span>
        <span>Аркада</span>
      </button>
      <button class="tabbtn" data-tab="battlepass" aria-label="Пропуск">
        <span class="tab-icon" style="--mask-url:url(/static/img/tabs/battlepass.svg)"></span>
        <span>Пропуск</span>
      </button>
      <button class="tabbtn admin-only" data-tab="admin" aria-label="Админ" hidden>
        <span class="tab-icon" style="--mask-url:url(/static/img/tabs/admin.svg)"></span>
        <span>Админ</span>
      </button>
    </nav>
  </div>

  <div id="modal-root"></div>
  <script>
    window.onerror = function(msg, url, line, col, error) {
      document.getElementById('app').innerHTML += '<div style="color:red;padding:20px;background:#fee;border-radius:8px;margin:10px;"><b>JS Error:</b> ' + msg + '<br>Line: ' + line + '</div>';
    };
    window.addEventListener('unhandledrejection', function(e) {
      document.getElementById('app').innerHTML += '<div style="color:red;padding:20px;background:#fee;border-radius:8px;margin:10px;"><b>Promise Error:</b> ' + (e.reason && e.reason.message ? e.reason.message : e.reason) + '</div>';
    });
  </script>
  <script type="module" src="/static/app.js?v=83"></script>
</body>
</html>
