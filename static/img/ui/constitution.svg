<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="constParchment" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8E1"/>
      <stop offset="100%" style="stop-color:#FFE0B2"/>
    </linearGradient>
    <linearGradient id="constSeal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E53935"/>
      <stop offset="100%" style="stop-color:#C62828"/>
    </linearGradient>
    <linearGradient id="constRibbon" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFC107"/>
      <stop offset="100%" style="stop-color:#FFA000"/>
    </linearGradient>
  </defs>
  <!-- Scroll body -->
  <rect x="12" y="8" width="40" height="48" rx="2" fill="url(#constParchment)" stroke="#8D6E63" stroke-width="1.5"/>
  <!-- Scroll rolls (top and bottom) -->
  <ellipse cx="32" cy="8" rx="20" ry="4" fill="#D7CCC8" stroke="#8D6E63" stroke-width="1.5"/>
  <ellipse cx="32" cy="56" rx="20" ry="4" fill="#D7CCC8" stroke="#8D6E63" stroke-width="1.5"/>
  <!-- Text lines -->
  <rect x="18" y="16" width="28" height="2" rx="1" fill="#8D6E63"/>
  <rect x="18" y="22" width="24" height="2" rx="1" fill="#8D6E63"/>
  <rect x="18" y="28" width="28" height="2" rx="1" fill="#8D6E63"/>
  <rect x="18" y="34" width="20" height="2" rx="1" fill="#8D6E63"/>
  <rect x="18" y="40" width="26" height="2" rx="1" fill="#8D6E63"/>
  <!-- Wax seal -->
  <circle cx="44" cy="46" r="7" fill="url(#constSeal)"/>
  <circle cx="44" cy="46" r="4" fill="#FFCDD2"/>
  <path d="M42 44l2 2 3-3" stroke="#C62828" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Ribbon -->
  <rect x="28" y="44" width="8" height="12" rx="1" fill="url(#constRibbon)"/>
  <path d="M30 56l2 4 2-4" fill="url(#constRibbon)"/>
</svg>
