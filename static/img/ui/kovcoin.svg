<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="Ковкойн">
  <defs>
    <radialGradient id="kcFace" cx="38%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#4ff08f"/>
      <stop offset="55%" stop-color="#22b866"/>
      <stop offset="100%" stop-color="#128046"/>
    </radialGradient>
    <linearGradient id="kcRim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2fa85f"/>
      <stop offset="100%" stop-color="#0b5c30"/>
    </linearGradient>
    <linearGradient id="kcBust" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbf3d8"/>
      <stop offset="100%" stop-color="#e8d7a6"/>
    </linearGradient>
    <clipPath id="kcClip"><circle cx="50" cy="50" r="38"/></clipPath>
  </defs>

  <!-- Гурт монеты -->
  <circle cx="50" cy="50" r="49" fill="url(#kcRim)"/>
  <circle cx="50" cy="50" r="49" fill="none" stroke="#0a4d28" stroke-width="1.5"/>
  <!-- Насечки по ребру -->
  <g stroke="#0a5c30" stroke-width="1.4" opacity="0.5">
    <line x1="50" y1="2"  x2="50" y2="7"/>
    <line x1="50" y1="93" x2="50" y2="98"/>
    <line x1="2"  y1="50" x2="7"  y2="50"/>
    <line x1="93" y1="50" x2="98" y2="50"/>
    <line x1="16" y1="16" x2="20" y2="20"/>
    <line x1="80" y1="80" x2="84" y2="84"/>
    <line x1="80" y1="20" x2="84" y2="16"/>
    <line x1="16" y1="84" x2="20" y2="80"/>
  </g>

  <!-- Поле монеты -->
  <circle cx="50" cy="50" r="42" fill="url(#kcFace)"/>
  <circle cx="50" cy="50" r="38" fill="none" stroke="#0e7a45" stroke-width="2"/>
  <circle cx="50" cy="50" r="35" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.25"/>

  <!-- Силуэт председателя (камея) -->
  <g clip-path="url(#kcClip)" fill="url(#kcBust)">
    <!-- Плечи -->
    <path d="M26 82 C26 65 37 59 50 59 C63 59 74 65 74 82 L74 90 L26 90 Z"/>
    <!-- Шея -->
    <rect x="44.5" y="52" width="11" height="10" rx="3"/>
    <!-- Голова -->
    <circle cx="50" cy="43" r="12.5"/>
    <!-- Козырёк фуражки -->
    <path d="M35 33 Q50 29 65 33 Q66 36 63 37.5 L37 37.5 Q34 36 35 33 Z"/>
    <!-- Тулья фуражки -->
    <path d="M38 33 Q39 21 50 21 Q61 21 62 33 Z"/>
  </g>
  <!-- Кокарда на фуражке -->
  <circle cx="50" cy="30" r="2.2" fill="#0e7a45"/>
</svg>
