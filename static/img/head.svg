<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 80" shape-rendering="crispEdges" aria-hidden="true">
  <!-- Pixel-art Minecraft head with Soviet officer cap (фуражка) -->

  <!-- Cap crown top (olive green, slightly narrower for rounded look) -->
  <rect x="16" y="6" width="40" height="4" fill="#4a5a32"/>
  <rect x="12" y="10" width="48" height="4" fill="#586a3a"/>
  <rect x="10" y="14" width="52" height="10" fill="#5e7140"/>

  <!-- Crown shadow band -->
  <rect x="10" y="24" width="52" height="2" fill="#3e4a26"/>

  <!-- Red band (just above visor) -->
  <rect x="6" y="26" width="60" height="3" fill="#a72020"/>

  <!-- Visor (peaked, wider than crown, dark) -->
  <rect x="4" y="29" width="64" height="5" fill="#1a1a1a"/>
  <rect x="4" y="34" width="64" height="2" fill="#0c0c0c"/>

  <!-- Red star, front of crown -->
  <rect x="34" y="10" width="4" height="4" fill="#e22a2a"/>
  <rect x="30" y="14" width="12" height="2" fill="#e22a2a"/>
  <rect x="32" y="16" width="8" height="2" fill="#e22a2a"/>
  <rect x="30" y="18" width="4" height="2" fill="#e22a2a"/>
  <rect x="38" y="18" width="4" height="2" fill="#e22a2a"/>
  <rect x="34" y="12" width="2" height="2" fill="#ff5a5a"/>

  <!-- Face base (Steve skin tone) -->
  <rect x="16" y="36" width="40" height="34" fill="#bb8c5f"/>
  <!-- Right side shading -->
  <rect x="48" y="36" width="8" height="34" fill="#9d7549"/>
  <!-- Forehead darker line directly under visor -->
  <rect x="16" y="36" width="40" height="2" fill="#80592e"/>

  <!-- Left eye (white + iris) -->
  <rect x="22" y="46" width="6" height="6" fill="#ffffff"/>
  <rect x="24" y="48" width="4" height="4" fill="#3a4d8b"/>
  <!-- Right eye -->
  <rect x="40" y="46" width="6" height="6" fill="#ffffff"/>
  <rect x="42" y="48" width="4" height="4" fill="#3a4d8b"/>

  <!-- Cheek shading (left side outline) -->
  <rect x="16" y="56" width="2" height="6" fill="#9b6f44"/>

  <!-- Mouth -->
  <rect x="26" y="60" width="14" height="2" fill="#5a3925"/>
  <rect x="28" y="62" width="10" height="2" fill="#5a3925"/>

  <!-- Neck -->
  <rect x="22" y="70" width="28" height="6" fill="#cdb59a"/>
  <rect x="48" y="70" width="6" height="6" fill="#a78a6c"/>
  <!-- Collar / shoulder hint (uniform olive) -->
  <rect x="18" y="76" width="36" height="4" fill="#5e7140"/>
  <rect x="50" y="76" width="6" height="4" fill="#3e4a26"/>
</svg>
