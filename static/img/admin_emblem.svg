<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" shape-rendering="crispEdges" aria-hidden="true">
  <!-- Председатель badge: red star with gold rim, Minecraft pixel style -->

  <!-- Outer ring (gold) -->
  <rect x="20" y="6"  width="40" height="6"  fill="#c8a02f"/>
  <rect x="14" y="12" width="6"  height="6"  fill="#c8a02f"/>
  <rect x="60" y="12" width="6"  height="6"  fill="#c8a02f"/>
  <rect x="8"  y="18" width="6"  height="44" fill="#c8a02f"/>
  <rect x="66" y="18" width="6"  height="44" fill="#c8a02f"/>
  <rect x="14" y="62" width="6"  height="6"  fill="#c8a02f"/>
  <rect x="60" y="62" width="6"  height="6"  fill="#c8a02f"/>
  <rect x="20" y="68" width="40" height="6"  fill="#c8a02f"/>

  <!-- Gold highlight -->
  <rect x="20" y="6"  width="40" height="2"  fill="#f3d362"/>
  <rect x="14" y="12" width="2"  height="2"  fill="#f3d362"/>
  <rect x="58" y="12" width="2"  height="2"  fill="#f3d362"/>
  <rect x="8"  y="18" width="2"  height="44" fill="#f3d362"/>
  <rect x="66" y="68" width="2"  height="2"  fill="#9c7c1c"/>
  <rect x="14" y="68" width="2"  height="2"  fill="#9c7c1c"/>
  <rect x="20" y="72" width="40" height="2"  fill="#9c7c1c"/>

  <!-- Background (dark crimson) inside ring -->
  <rect x="20" y="12" width="40" height="6"  fill="#7a1a1a"/>
  <rect x="14" y="18" width="52" height="44" fill="#7a1a1a"/>
  <rect x="20" y="62" width="40" height="6"  fill="#7a1a1a"/>

  <!-- Five-point red star (pixelated) -->
  <!-- top spike -->
  <rect x="38" y="20" width="4" height="6"  fill="#e23a3a"/>
  <rect x="38" y="20" width="2" height="6"  fill="#ff6868"/>
  <!-- upper-left + upper-right -->
  <rect x="20" y="30" width="40" height="6" fill="#e23a3a"/>
  <rect x="20" y="30" width="40" height="2" fill="#ff6868"/>
  <!-- middle body -->
  <rect x="24" y="36" width="32" height="8" fill="#e23a3a"/>
  <!-- lower triangles -->
  <rect x="26" y="44" width="10" height="6" fill="#e23a3a"/>
  <rect x="44" y="44" width="10" height="6" fill="#e23a3a"/>
  <rect x="28" y="50" width="6"  height="6" fill="#e23a3a"/>
  <rect x="46" y="50" width="6"  height="6" fill="#e23a3a"/>
  <rect x="28" y="50" width="6"  height="2" fill="#a92222"/>
  <rect x="46" y="50" width="6"  height="2" fill="#a92222"/>
  <!-- bottom shading on body -->
  <rect x="24" y="42" width="32" height="2" fill="#a92222"/>
</svg>
