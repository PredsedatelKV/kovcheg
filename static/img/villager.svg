<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <defs>
    <linearGradient id="ushankaTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6D4C41"/>
      <stop offset="100%" style="stop-color:#4E342E"/>
    </linearGradient>
    <linearGradient id="ushankaFlap" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8D6E63"/>
      <stop offset="100%" style="stop-color:#6D4C41"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#E8F5E9"/>
  <!-- Ushanka top -->
  <rect x="18" y="8" width="28" height="6" fill="url(#ushankaTop)"/>
  <rect x="20" y="6" width="24" height="4" fill="url(#ushankaTop)"/>
  <!-- Ushanka flaps (ears) -->
  <rect x="14" y="14" width="6" height="14" fill="url(#ushankaFlap)"/>
  <rect x="44" y="14" width="6" height="14" fill="url(#ushankaFlap)"/>
  <!-- Ushanka flap tips -->
  <rect x="14" y="26" width="6" height="4" fill="#A1887F"/>
  <rect x="44" y="26" width="6" height="4" fill="#A1887F"/>
  <!-- Head (elongated) -->
  <rect x="20" y="14" width="24" height="22" fill="#D4A574"/>
  <!-- Stubble (dark dots on lower face) -->
  <rect x="22" y="30" width="2" height="2" fill="#8D6E63"/>
  <rect x="26" y="32" width="2" height="2" fill="#8D6E63"/>
  <rect x="30" y="30" width="2" height="2" fill="#8D6E63"/>
  <rect x="34" y="32" width="2" height="2" fill="#8D6E63"/>
  <rect x="38" y="30" width="2" height="2" fill="#8D6E63"/>
  <rect x="24" y="34" width="2" height="2" fill="#8D6E63"/>
  <rect x="28" y="34" width="2" height="2" fill="#8D6E63"/>
  <rect x="32" y="34" width="2" height="2" fill="#8D6E63"/>
  <rect x="36" y="34" width="2" height="2" fill="#8D6E63"/>
  <rect x="40" y="34" width="2" height="2" fill="#8D6E63"/>
  <!-- Eyes (tired, half-closed) -->
  <rect x="24" y="20" width="6" height="4" fill="#FFF"/>
  <rect x="34" y="20" width="6" height="4" fill="#FFF"/>
  <rect x="26" y="22" width="3" height="2" fill="#2E2E2E"/>
  <rect x="36" y="22" width="3" height="2" fill="#2E2E2E"/>
  <!-- Eyebrows (messy) -->
  <rect x="22" y="18" width="8" height="2" fill="#5D4037"/>
  <rect x="34" y="18" width="8" height="2" fill="#5D4037"/>
  <!-- Big red nose -->
  <rect x="28" y="24" width="8" height="6" fill="#E57373"/>
  <rect x="30" y="25" width="4" height="4" fill="#EF5350"/>
  <!-- Mouth (crooked) -->
  <rect x="28" y="36" width="8" height="2" fill="#8B4513"/>
  <!-- Body (tattered shirt) -->
  <rect x="18" y="40" width="28" height="14" fill="#5C6BC0"/>
  <!-- Shirt patches -->
  <rect x="22" y="44" width="6" height="4" fill="#3949AB"/>
  <rect x="36" y="48" width="6" height="4" fill="#3949AB"/>
  <!-- Arms -->
  <rect x="12" y="42" width="6" height="10" fill="#5C6BC0"/>
  <rect x="46" y="42" width="6" height="10" fill="#5C6BC0"/>
  <!-- Hands -->
  <rect x="12" y="50" width="6" height="4" fill="#D4A574"/>
  <rect x="46" y="50" width="6" height="4" fill="#D4A574"/>
</svg>
