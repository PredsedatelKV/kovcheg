<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Шапка -->
  <rect x="20" y="4" width="24" height="4" fill="#5D4037"/>
  <rect x="16" y="8" width="32" height="4" fill="#6D4C41"/>
  <rect x="12" y="12" width="40" height="4" fill="#795548"/>
  
  <!-- Лицо -->
  <rect x="16" y="16" width="32" height="28" fill="#FFCC80"/>
  
  <!-- Уши -->
  <rect x="12" y="20" width="4" height="12" fill="#FFCC80"/>
  <rect x="48" y="20" width="4" height="12" fill="#FFCC80"/>
  
  <!-- Усы / бровь (unibrow как у жителя) -->
  <rect x="20" y="20" width="24" height="3" fill="#4E342E"/>
  
  <!-- Глаза -->
  <rect x="22" y="25" width="6" height="4" fill="#81C784"/>
  <rect x="23" y="26" width="2" height="2" fill="#1B5E20"/>
  <rect x="36" y="25" width="6" height="4" fill="#81C784"/>
  <rect x="37" y="26" width="2" height="2" fill="#1B5E20"/>
  
  <!-- Нос (большой, как у жителя Minecraft) -->
  <rect x="28" y="29" width="8" height="10" fill="#FFAB91"/>
  <rect x="28" y="29" width="8" height="2" fill="#FF8A65"/>
  <rect x="28" y="37" width="8" height="2" fill="#E57373"/>
  
  <!-- Борода / подбородок -->
  <rect x="24" y="39" width="16" height="3" fill="#D7CCC8"/>
  <rect x="26" y="42" width="12" height="2" fill="#BCAAA4"/>
  
  <!-- Улыбка -->
  <rect x="26" y="40" width="12" height="2" fill="#FF7043"/>
  <rect x="28" y="39" width="2" height="1" fill="#FF7043"/>
  <rect x="34" y="39" width="2" height="1" fill="#FF7043"/>
  
  <!-- Роба -->
  <rect x="16" y="44" width="32" height="16" fill="#6D4C41"/>
  <rect x="20" y="44" width="24" height="16" fill="#795548"/>
  
  <!-- Рукава -->
  <rect x="8" y="48" width="8" height="12" fill="#6D4C41"/>
  <rect x="48" y="48" width="8" height="12" fill="#6D4C41"/>
  
  <!-- Воротник -->
  <rect x="22" y="44" width="20" height="3" fill="#5D4037"/>
  
  <!-- Пуговицы -->
  <rect x="30" y="50" width="4" height="2" fill="#3E2723"/>
  <rect x="30" y="56" width="4" height="2" fill="#3E2723"/>
</svg>
