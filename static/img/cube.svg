<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 84" fill="none" aria-hidden="true">
  <!-- isometric cube with soft rounded corners -->
  <defs>
    <linearGradient id="topFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8ecf4"/>
    </linearGradient>
    <linearGradient id="leftFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d0d6e0"/>
      <stop offset="100%" stop-color="#b0b8c6"/>
    </linearGradient>
    <linearGradient id="rightFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b8bfcc"/>
      <stop offset="100%" stop-color="#9aa2b0"/>
    </linearGradient>
    <filter id="cubeShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  <g filter="url(#cubeShadow)">
    <!-- top face (lighter) -->
    <path d="M40 6 C40 6 70 20 70 20 L40 34 C40 34 10 20 10 20 Z" fill="url(#topFace)" stroke="#9aa2b0" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- left face -->
    <path d="M10 20 L10 60 C10 60 40 74 40 74 L40 34 Z" fill="url(#leftFace)" stroke="#9aa2b0" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- right face -->
    <path d="M70 20 L70 60 C70 60 40 74 40 74 L40 34 Z" fill="url(#rightFace)" stroke="#9aa2b0" stroke-width="1.5" stroke-linejoin="round"/>
  </g>
  <!-- inner edge highlights -->
  <path d="M40 34 L40 74" stroke="#7a8496" stroke-width="0.8" opacity="0.4"/>
  <path d="M10 60 L40 74" stroke="#7a8496" stroke-width="0.8" opacity="0.25"/>
  <path d="M70 60 L40 74" stroke="#7a8496" stroke-width="0.8" opacity="0.25"/>
  <!-- tiny specular highlight on top face -->
  <path d="M26 17 C30 15 34 15 38 17" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <path d="M50 17 C54 15 58 15 62 17" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
</svg>
